name: Build and Release Smart Bridge

# ── Triggers ──────────────────────────────────────────────────────────────────
# Auto-release: any change to mcp-server.js or smart-bridge-server.js on main
#   → auto-bumps patch in bridge-version.json and publishes a new release.
# Manual: workflow_dispatch with optional version override.
# Guard: skip runs triggered by the bot's own release commits (no loop).

on:
  push:
    branches: [main]
    paths:
      - mcp-server.js
      - smart-bridge-server.js
      - bridge-update.js
      - bridge-version.json
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.3.0). Overrides bridge-version.json.'
        required: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Prevent infinite loop: the bot commits bridge-version.json + addons/smart-bridge.js
    # at the end; those commits must not re-trigger a new release run.
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need parent commit to diff changed files

      # ── Resolve version ───────────────────────────────────────────────────────
      - name: Resolve version and release flag
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # Manual override: use provided version, always release
            VERSION="${{ github.event.inputs.version }}"
            node -e "
              var v=require('fs').readFileSync('/dev/stdin','utf8').trim();
              require('fs').writeFileSync('bridge-version.json', JSON.stringify({version:v})+'\n');
            " <<< "$VERSION"
            SHOULD_RELEASE=true
            AUTO_BUMPED=false
          elif git diff HEAD~1 -- bridge-version.json | grep -q '^+'; then
            # bridge-version.json was bumped manually — honour it
            VERSION=$(node -p "require('./bridge-version.json').version")
            SHOULD_RELEASE=true
            AUTO_BUMPED=false
          else
            # Server files changed but no manual bump — auto-bump patch and release
            CURRENT=$(node -p "require('./bridge-version.json').version")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            node -e "require('fs').writeFileSync('bridge-version.json', JSON.stringify({version:'$VERSION'})+'\n');"
            echo "Auto-bumped patch: $CURRENT → $VERSION"
            SHOULD_RELEASE=true
            AUTO_BUMPED=true
          fi
          echo "version=$VERSION"           >> $GITHUB_OUTPUT
          echo "tag=bridge-v$VERSION"       >> $GITHUB_OUTPUT
          echo "release=$SHOULD_RELEASE"    >> $GITHUB_OUTPUT
          echo "auto_bumped=$AUTO_BUMPED"   >> $GITHUB_OUTPUT
          echo "Version: $VERSION  |  Release: $SHOULD_RELEASE  |  AutoBumped: $AUTO_BUMPED"

      # ── Node setup ───────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── Install build deps ────────────────────────────────────────────────────
      # @yao-pkg/pkg is the maintained fork of the original 'pkg' bundler.
      # ws is the WebSocket library used by smart-bridge-server.js.
      - name: Install build dependencies
        run: npm install --save-dev @yao-pkg/pkg ws

      - name: Run regression tests
        run: npm test

      # ── Build binaries ────────────────────────────────────────────────────────
      - name: Build standalone binaries
        run: |
          mkdir -p dist
          npx pkg smart-bridge-server.js \
            --targets node18-win-x64,node18-macos-x64,node18-linux-x64 \
            --output dist/clashcontrol-smart-bridge

      # ── Package archives ──────────────────────────────────────────────────────
      - name: Package macOS and Linux archives
        run: |
          cd dist
          chmod +x clashcontrol-smart-bridge-macos clashcontrol-smart-bridge-linux
          tar -czf clashcontrol-smart-bridge-mac.tar.gz   clashcontrol-smart-bridge-macos
          tar -czf clashcontrol-smart-bridge-linux.tar.gz clashcontrol-smart-bridge-linux
          sha256sum clashcontrol-smart-bridge-win.exe \
            clashcontrol-smart-bridge-mac.tar.gz \
            clashcontrol-smart-bridge-linux.tar.gz > SHA256SUMS
          ls -lh

      # ── Publish GitHub Release (only on version bump or manual trigger) ───────
      - name: Create GitHub Release
        if: steps.ver.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.ver.outputs.tag }}
          name:       "Smart Bridge ${{ steps.ver.outputs.tag }}"
          make_latest: true
          body: |
            ## ClashControl Smart Bridge ${{ steps.ver.outputs.tag }}

            LLM bridge — connect Claude, ChatGPT, or any AI to control ClashControl
            with natural language. 66 MCP tools available.

            ### Zero-click setup
            1. Open ClashControl → Addons → **Enable Smart Bridge**
            2. The binary downloads and starts automatically
            3. Claude Desktop is configured on first run — just restart Claude

            ### Manual download
            Download the binary for your platform, run it once, restart Claude Desktop.

            | Platform | File |
            |----------|------|
            | Windows  | `clashcontrol-smart-bridge-win.exe` |
            | macOS    | `clashcontrol-smart-bridge-mac.tar.gz` |
            | Linux    | `clashcontrol-smart-bridge-linux.tar.gz` |

            Verify a download with the published `SHA256SUMS` file before running it.

            ### Connect other AI assistants
            - **ChatGPT:** Custom GPT → Actions → Import from `http://localhost:19803/openapi.json`
            - **Any LLM:** `POST http://localhost:19803/call/{tool_name}` · [view tools](http://localhost:19803/tools)
          files: |
            dist/clashcontrol-smart-bridge-win.exe
            dist/clashcontrol-smart-bridge-mac.tar.gz
            dist/clashcontrol-smart-bridge-linux.tar.gz
            dist/SHA256SUMS

      # ── Update _releaseTag in the addon + commit bridge-version.json if auto-bumped
      - name: Bump _releaseTag in addon
        if: steps.ver.outputs.release == 'true'
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          sed -i "s|var _releaseTag = '[^']*'|var _releaseTag = '${TAG}'|" addons/smart-bridge.js
          echo "Updated _releaseTag to $TAG"

      - name: Commit updated files
        if: steps.ver.outputs.release == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add addons/smart-bridge.js
          # Stage bridge-version.json only if it was auto-bumped (manual bumps are already committed)
          if [ "${{ steps.ver.outputs.auto_bumped }}" = "true" ]; then
            git add bridge-version.json
          fi
          git diff --staged --quiet || git commit -m "chore: bump Smart Bridge to ${{ steps.ver.outputs.tag }}"
          git push
