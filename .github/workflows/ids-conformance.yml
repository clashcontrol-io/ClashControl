name: IDS Conformance

# Drives every pass-/fail-/invalid- .ifc+.ids pair from the official
# buildingSMART/IDS conformance corpus (Documentation/ImplementersDocumentation/
# TestCases) through the real app in headless Chromium — real web-ifc WASM
# load, real window._ccParseIDS/_ccRunIDS — and grades each one against the
# corpus's documented expected outcome (see tests/browser/ids-grade.js for
# why "wrong" and "incomplete" are scored separately: CC's engine honestly
# reports facets it can't verify yet instead of guessing, and a naive
# pass-rate gate would count every one of those as a failure).
#
# Manual/scheduled only, not on every PR: ~250+ headless-browser round trips
# is meaningfully heavier than the browser-smoke job, and this is a new job
# that could not be verified locally before it first shipped (this dev
# sandbox's proxy blocks the CDNs the app itself needs — see MEMORY.md — so
# a real Actions run is the only way to prove it out). Once a few runs are
# green, wiring this to run automatically on pushes/PRs that touch
# addons/data-quality.js or tests/(browser/)?ids-* is a natural follow-up —
# see MEMORY.md.
#
# The corpus is pinned. Updating it is an explicit reviewable change, so an
# upstream testcase edit cannot silently change ClashControl's baseline.

on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1' # weekly, Monday 04:17 UTC — catches corpus drift

permissions:
  contents: read

jobs:
  ids-conformance:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # buildingSMART/IDS development, verified 2026-07-14.
      IDS_CORPUS_COMMIT: 016bbadce0d227d8eabbbc3e8b2b3788590b8a97
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch buildingSMART IDS conformance corpus
        run: |
          git clone --filter=blob:none --no-checkout --sparse \
            https://github.com/buildingSMART/IDS.git /tmp/ids-corpus
          cd /tmp/ids-corpus
          git sparse-checkout set Documentation/ImplementersDocumentation/TestCases
          git fetch --depth 1 origin "$IDS_CORPUS_COMMIT"
          git checkout --detach "$IDS_CORPUS_COMMIT"

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1
          npx playwright install --with-deps chromium

      - name: Run IDS conformance suite
        env:
          IDS_REPORT_PATH: ids-conformance-report.json
        run: node tests/browser/ids-conformance.mjs /tmp/ids-corpus/Documentation/ImplementersDocumentation/TestCases

      - name: Publish IDS baseline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ids-conformance-${{ env.IDS_CORPUS_COMMIT }}
          path: ids-conformance-report.json
          if-no-files-found: warn
