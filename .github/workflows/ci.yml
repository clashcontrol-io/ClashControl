name: CI

# Runs the lightweight node:test suite (api/ validation + shared utils).
# No build step and no dependency install — the tests only touch api/*.js,
# which depend on nothing outside the standard library.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        run: npm test
